<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>打地鼠</title>
<link rel="icon" href="data:,">

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  touch-action: manipulation;
  user-select: none;
  -webkit-user-select: none;
}

body {
  font-family: Arial, "Noto Sans TC", sans-serif;
  background: linear-gradient(#9bd978, #68b84f);
}

.game {
  width: 100vw;
  height: 100dvh;
  padding: 6px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.topBar {
  background: #fff7df;
  border: 3px solid #5b3a1e;
  border-radius: 14px;
  padding: 5px 8px;
  color: #5b3a1e;
  flex-shrink: 0;
}

.hud {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 6px;
  font-size: 18px;
  font-weight: bold;
}

.hudLeft {
  text-align: left;
}

.hudCenter {
  text-align: center;
}

.hudRight {
  text-align: right;
}

.title {
  font-size: 22px;
  font-weight: 900;
}

.controls {
  margin-top: 4px;
  text-align: center;
}

button {
  padding: 5px 13px;
  margin: 2px;
  border: none;
  border-radius: 999px;
  background: #e97c2c;
  color: white;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
}

button:active {
  transform: scale(0.95);
}

.boardWrap {
  flex: 1;
  min-height: 0;
  width: 100%;
}

.board {
  width: 100%;
  height: 100%;
  display: grid;
  justify-content: space-between;
  align-content: space-between;
  gap: var(--gap, 10px);
}

.hole {
  width: var(--holeSize, 120px);
  height: var(--holeSize, 120px);
  background: #5b3a1e;
  border-radius: 50%;
  position: relative;
  overflow: hidden;
  box-shadow: inset 0 8px 0 rgba(0,0,0,0.25);
  cursor: pointer;
}

.hole.wrong {
  animation: wrongFlash 0.25s;
}

@keyframes wrongFlash {
  0% { background: #5b3a1e; }
  50% { background: #ff2b2b; transform: scale(0.95); }
  100% { background: #5b3a1e; }
}

.mole {
  position: absolute;
  left: 50%;
  bottom: -80%;
  transform: translateX(-50%);
  width: 72%;
  height: 72%;
  background: #9b6638;
  border-radius: 50% 50% 40% 40%;
  transition: bottom 0.12s;
}

.eye {
  position: absolute;
  top: 28%;
  width: 12%;
  height: 12%;
  background: black;
  border-radius: 50%;
}

.eye.left { left: 28%; }
.eye.right { right: 28%; }

.nose {
  position: absolute;
  left: 50%;
  top: 48%;
  transform: translateX(-50%);
  width: 24%;
  height: 15%;
  background: #ffb6b6;
  border-radius: 50%;
}

.stars {
  position: absolute;
  left: 50%;
  top: -32%;
  transform: translateX(-50%);
  font-size: clamp(18px, 4vw, 34px);
  display: none;
  animation: starsSpin 0.45s linear infinite;
}

@keyframes starsSpin {
  0% { transform: translateX(-50%) rotate(0deg); }
  100% { transform: translateX(-50%) rotate(360deg); }
}

.hole.show .mole {
  bottom: 8%;
}

.hole.hit .mole {
  bottom: 8%;
  animation: dizzyShake 0.4s;
}

.hole.hit .stars {
  display: block;
}

.hole.hit .eye {
  width: 18%;
  height: 18%;
  background: transparent;
}

.hole.hit .eye::before {
  content: "×";
  position: absolute;
  left: 0;
  top: -45%;
  font-size: clamp(18px, 4vw, 30px);
  font-weight: bold;
  color: black;
}

@keyframes dizzyShake {
  0% { transform: translateX(-50%) rotate(0deg); }
  25% { transform: translateX(-52%) rotate(-8deg); }
  50% { transform: translateX(-48%) rotate(8deg); }
  75% { transform: translateX(-52%) rotate(-8deg); }
  100% { transform: translateX(-50%) rotate(0deg); }
}

.toast {
  position: fixed;
  left: 50%;
  bottom: 14px;
  transform: translateX(-50%);
  background: #fff7df;
  border: 4px solid #5b3a1e;
  border-radius: 999px;
  padding: 8px 22px;
  font-size: 22px;
  font-weight: bold;
  color: #5b3a1e;
  display: none;
  z-index: 20;
}

.toast.show { display: block; }
.toast.wrongText { color: #d60000; }

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.modal.show { display: flex; }

.modalBox {
  width: min(90vw, 460px);
  background: #fff7df;
  border: 6px solid #5b3a1e;
  border-radius: 26px;
  padding: 26px;
  text-align: center;
  box-shadow: 0 12px 0 #3b2412;
}

.modalBox h2 {
  margin: 0 0 14px;
  font-size: 34px;
  color: #5b3a1e;
}

.settingRow {
  margin: 14px 0;
  font-size: 20px;
  font-weight: bold;
  color: #5b3a1e;
}

input, select {
  width: 130px;
  padding: 8px;
  font-size: 20px;
  text-align: center;
  border: 3px solid #5b3a1e;
  border-radius: 10px;
  background: white;
}

.resultText {
  font-size: 28px;
  font-weight: bold;
  color: #5b3a1e;
}

@media (max-height: 760px) {
  .title { font-size: 18px; }
  .hud { font-size: 15px; }
  button { font-size: 14px; padding: 4px 11px; }
  .topBar { padding: 4px 7px; }
  .controls { margin-top: 2px; }
}
</style>
</head>

<body>

<div class="game">
  <div class="topBar">
    <div class="hud">
      <div class="hudLeft">分數：<span id="score">0</span></div>
      <div class="hudCenter">
        <div class="title">打地鼠</div>
        <div>時間：<span id="time">60</span>s</div>
      </div>
      <div class="hudRight">洞：<span id="holeInfo">3×3</span></div>
    </div>

    <div class="controls">
      <button onclick="openSettings()">設定</button>
      <button id="mainButton" onclick="toggleGame()">開始遊戲</button>
    </div>
  </div>

  <div class="boardWrap" id="boardWrap">
    <div class="board" id="board"></div>
  </div>
</div>

<div class="toast" id="toast">打中！</div>

<div class="modal show" id="settingsModal">
  <div class="modalBox">
    <h2>遊戲設定</h2>

    <div class="settingRow">
      地鼠出現時間<br>
      <input id="speedInput" type="number" value="0.8" min="0.1" max="10" step="0.1">
      秒
    </div>

    <div class="settingRow">
      洞的數量<br>
      <select id="gridSelect">
        <option value="3x3">3×3</option>
        <option value="4x3">4×3</option>
        <option value="5x3">5×3</option>
      </select>
    </div>

    <button onclick="applySettingsAndStart()">開始遊戲</button>
  </div>
</div>

<div class="modal" id="resultModal">
  <div class="modalBox">
    <h2>時間到！</h2>
    <div class="resultText" id="resultText">你打中 0 隻地鼠！</div>
    <br>
    <button onclick="closeResult()">再玩一次</button>
    <button onclick="openSettings()">重新設定</button>
  </div>
</div>

<script>
const boardWrap = document.getElementById("boardWrap");
const board = document.getElementById("board");
const scoreText = document.getElementById("score");
const timeText = document.getElementById("time");
const speedInput = document.getElementById("speedInput");
const gridSelect = document.getElementById("gridSelect");
const holeInfo = document.getElementById("holeInfo");
const settingsModal = document.getElementById("settingsModal");
const resultModal = document.getElementById("resultModal");
const resultText = document.getElementById("resultText");
const mainButton = document.getElementById("mainButton");
const toast = document.getElementById("toast");

let score = 0;
let timeLeft = 60;
let moleTimer = null;
let countdownTimer = null;
let currentHole = null;
let playing = false;
let isHitAnimating = false;
let rows = 3;
let cols = 3;
let holes = [];
let toastTimer = null;

function resizeBoard() {
  const rect = boardWrap.getBoundingClientRect();
  const gap = Math.max(8, Math.min(18, rect.width * 0.012));

  const sizeByWidth = (rect.width - gap * (cols - 1)) / cols;
  const sizeByHeight = (rect.height - gap * (rows - 1)) / rows;

  const holeSize = Math.floor(Math.min(sizeByWidth, sizeByHeight));

  board.style.setProperty("--holeSize", holeSize + "px");
  board.style.setProperty("--gap", gap + "px");
}

function createBoard() {
  board.innerHTML = "";
  holes = [];

  board.style.gridTemplateColumns = `repeat(${cols}, var(--holeSize))`;
  board.style.gridTemplateRows = `repeat(${rows}, var(--holeSize))`;

  for (let i = 0; i < rows * cols; i++) {
    const hole = document.createElement("div");
    hole.className = "hole";

    const mole = document.createElement("div");
    mole.className = "mole";

    const stars = document.createElement("div");
    stars.className = "stars";
    stars.textContent = "⭐";

    const leftEye = document.createElement("div");
    leftEye.className = "eye left";

    const rightEye = document.createElement("div");
    rightEye.className = "eye right";

    const nose = document.createElement("div");
    nose.className = "nose";

    mole.appendChild(stars);
    mole.appendChild(leftEye);
    mole.appendChild(rightEye);
    mole.appendChild(nose);
    hole.appendChild(mole);
    board.appendChild(hole);

    hole.addEventListener("pointerdown", () => {
      if (!playing || isHitAnimating) return;

      if (hole.classList.contains("show")) {
        hitMole(hole);
      } else {
        wrongHit(hole);
      }
    });

    holes.push(hole);
  }

  requestAnimationFrame(resizeBoard);
}

function applySettings() {
  const value = gridSelect.value;

  if (value === "3x3") {
    cols = 3;
    rows = 3;
  } else if (value === "4x3") {
    cols = 4;
    rows = 3;
  } else if (value === "5x3") {
    cols = 5;
    rows = 3;
  }

  holeInfo.textContent = `${cols}×${rows}`;
  createBoard();
}

function applySettingsAndStart() {
  settingsModal.classList.remove("show");
  applySettings();
  startGame();
}

function openSettings() {
  stopGame();
  resultModal.classList.remove("show");
  settingsModal.classList.add("show");
}

function toggleGame() {
  if (playing) {
    stopGame();
  } else {
    startGame();
  }
}

function hitMole(hole) {
  score++;
  scoreText.textContent = score;

  playHitSound();
  showToast("打中！", false);

  clearTimeout(moleTimer);
  isHitAnimating = true;

  hole.classList.remove("show");
  hole.classList.add("hit");

  setTimeout(() => {
    hole.classList.remove("hit");
    currentHole = null;
    isHitAnimating = false;

    if (playing) showMole();
  }, 420);
}

function wrongHit(hole) {
  playWrongSound();
  showToast("打錯！", true);

  hole.classList.add("wrong");

  setTimeout(() => {
    hole.classList.remove("wrong");
  }, 250);
}

function showToast(text, wrong) {
  clearTimeout(toastTimer);
  toast.textContent = text;
  toast.classList.toggle("wrongText", wrong);
  toast.classList.add("show");

  toastTimer = setTimeout(() => {
    toast.classList.remove("show");
  }, 450);
}

function playHitSound() {
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const oscillator = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  oscillator.type = "square";
  oscillator.frequency.setValueAtTime(520, audioCtx.currentTime);
  oscillator.frequency.exponentialRampToValueAtTime(180, audioCtx.currentTime + 0.12);

  gain.gain.setValueAtTime(0.18, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);

  oscillator.connect(gain);
  gain.connect(audioCtx.destination);

  oscillator.start();
  oscillator.stop(audioCtx.currentTime + 0.12);
}

function playWrongSound() {
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const oscillator = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  oscillator.type = "sawtooth";
  oscillator.frequency.setValueAtTime(160, audioCtx.currentTime);
  oscillator.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.15);

  gain.gain.setValueAtTime(0.14, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);

  oscillator.connect(gain);
  gain.connect(audioCtx.destination);

  oscillator.start();
  oscillator.stop(audioCtx.currentTime + 0.15);
}

function showMole() {
  holes.forEach(hole => {
    hole.classList.remove("show");
    hole.classList.remove("hit");
  });

  const randomIndex = Math.floor(Math.random() * holes.length);
  currentHole = holes[randomIndex];
  currentHole.classList.add("show");

  let speedInSeconds = Number(speedInput.value);

  if (isNaN(speedInSeconds) || speedInSeconds < 0.1) {
    speedInSeconds = 0.8;
    speedInput.value = 0.8;
  }

  const speed = speedInSeconds * 1000;

  moleTimer = setTimeout(() => {
    if (currentHole) {
      currentHole.classList.remove("show");
      currentHole = null;
    }

    if (playing) showMole();
  }, speed);
}

function startGame() {
  stopGame();
  applySettings();

  score = 0;
  timeLeft = 60;
  playing = true;
  isHitAnimating = false;

  scoreText.textContent = score;
  timeText.textContent = timeLeft;
  resultModal.classList.remove("show");
  settingsModal.classList.remove("show");
  mainButton.textContent = "結束遊戲";

  showMole();

  countdownTimer = setInterval(() => {
    timeLeft--;
    timeText.textContent = timeLeft;

    if (timeLeft <= 0) endGame();
  }, 1000);
}

function stopGame() {
  playing = false;
  isHitAnimating = false;
  clearTimeout(moleTimer);
  clearInterval(countdownTimer);

  holes.forEach(hole => {
    hole.classList.remove("show");
    hole.classList.remove("hit");
    hole.classList.remove("wrong");
  });

  mainButton.textContent = "開始遊戲";
}

function endGame() {
  stopGame();
  resultText.textContent = "你打中 " + score + " 隻地鼠！";
  resultModal.classList.add("show");
}

function closeResult() {
  resultModal.classList.remove("show");
  startGame();
}

window.addEventListener("resize", resizeBoard);
window.addEventListener("orientationchange", () => {
  setTimeout(resizeBoard, 300);
});

createBoard();
</script>

</body>
</html>
