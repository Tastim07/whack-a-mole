<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>打地鼠</title>
<link rel="icon" href="data:,">

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}

body {
  font-family: Arial, "Noto Sans TC", sans-serif;
  background: linear-gradient(#9bd978, #68b84f);
}

.game {
  width: 100vw;
  height: 100dvh;
  padding: 6px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.topBar {
  background: #fff7df;
  border: 3px solid #5b3a1e;
  border-radius: 14px;
  padding: 5px 8px;
  color: #5b3a1e;
  flex-shrink: 0;
  position: relative;
  z-index: 80;
}

.hud {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 6px;
  font-size: 18px;
  font-weight: bold;
}

.hudLeft { text-align: left; }
.hudCenter { text-align: center; }
.hudRight { text-align: right; }

.title {
  font-size: 22px;
  font-weight: 900;
}

.controls {
  margin-top: 4px;
  text-align: center;
}

button {
  padding: 5px 13px;
  margin: 2px;
  border: none;
  border-radius: 999px;
  background: #e97c2c;
  color: white;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
}

button:active { transform: scale(0.95); }

.boardWrap {
  flex: 1;
  min-height: 0;
  width: 100%;
  position: relative;
  overflow: hidden;
  z-index: 1;
}

.board {
  width: 100%;
  height: 100%;
  display: grid;
  justify-content: space-between;
  align-content: space-between;
  gap: var(--gap, 10px);
  position: relative;
}

.board.customBoard {
  display: block;
}

.hole {
  width: var(--holeSize, 120px);
  height: var(--holeSize, 120px);
  background: #5b3a1e;
  border-radius: 50%;
  position: relative;
  overflow: hidden;
  box-shadow: inset 0 8px 0 rgba(0,0,0,0.25);
  cursor: pointer;
}

.customBoard .hole {
  position: absolute;
}

.hole.editing {
  outline: none;
}

.hole.spawnSelected {
  outline: 5px solid #ffcc00;
  outline-offset: 3px;
  box-shadow: 0 0 0 3px rgba(255,204,0,.35);
}

.hole.wrong {
  animation: wrongFlash 0.25s;
}

@keyframes wrongFlash {
  0% { background: #5b3a1e; }
  50% { background: #ff2b2b; }
  100% { background: #5b3a1e; }
}

.mole {
  position: absolute;
  left: 50%;
  bottom: -80%;
  transform: translateX(-50%);
  width: 72%;
  height: 72%;
  background: #9b6638;
  border-radius: 50% 50% 40% 40%;
  transition: bottom 0.12s;
}

.mole.evil { background: #4a235a; }

.mole.evil::after {
  content: "";
  position: absolute;
  left: 18%;
  top: 10%;
  width: 64%;
  height: 8%;
  background: #ff2b2b;
  border-radius: 999px;
  transform: rotate(-8deg);
}

.eye {
  position: absolute;
  top: 30%;
  width: 12%;
  height: 12%;
  background: black;
  border-radius: 50%;
  z-index: 2;
}

.eye.left { left: 28%; }
.eye.right { right: 28%; }

.mole.evil .eye { background: #ff2b2b; }

.nose {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translateX(-50%);
  width: 24%;
  height: 15%;
  background: #ffb6b6;
  border-radius: 50%;
  z-index: 2;
}

.mole.evil .nose { background: #111; }

.stars {
  position: absolute;
  left: 50%;
  top: -32%;
  transform: translateX(-50%);
  font-size: clamp(18px, 4vw, 34px);
  display: none;
  animation: starsSpin 0.45s linear infinite;
  z-index: 3;
}

@keyframes starsSpin {
  0% { transform: translateX(-50%) rotate(0deg); }
  100% { transform: translateX(-50%) rotate(360deg); }
}

.hole.show .mole { bottom: 8%; }

.hole.hit .mole {
  bottom: 8%;
  animation: dizzyShake 0.4s;
}

.hole.hit .stars { display: block; }

.hole.hit .eye {
  width: 18%;
  height: 18%;
  background: transparent;
}

.hole.hit .eye::before {
  content: "×";
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -58%);
  font-size: clamp(16px, 3.5vw, 28px);
  line-height: 1;
  font-weight: 900;
  color: black;
}

.mole.evil.hitEye .eye::before { color: #ff2b2b; }

@keyframes dizzyShake {
  0% { transform: translateX(-50%) rotate(0deg); }
  25% { transform: translateX(-52%) rotate(-8deg); }
  50% { transform: translateX(-48%) rotate(8deg); }
  75% { transform: translateX(-52%) rotate(-8deg); }
  100% { transform: translateX(-50%) rotate(0deg); }
}

.toast {
  position: fixed;
  left: 50%;
  bottom: 14px;
  transform: translateX(-50%);
  background: #fff7df;
  border: 4px solid #5b3a1e;
  border-radius: 999px;
  padding: 8px 22px;
  font-size: 22px;
  font-weight: bold;
  color: #5b3a1e;
  display: none;
  z-index: 30;
}

.toast.show { display: block; }
.toast.wrongText { color: #d60000; }

.evilOverlay {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle, rgba(120,255,90,0.28), rgba(110,0,160,0.45));
  pointer-events: none;
  opacity: 0;
  z-index: 15;
}

.evilOverlay.show {
  animation: evilFlash 1s ease-out forwards;
}

@keyframes evilFlash {
  0% { opacity: 1; }
  100% { opacity: 0; }
}

.customEditPanel {
  position: fixed;
  left: 50%;
  bottom: 8px;
  transform: translateX(-50%);
  background: #fff7df;
  border: 4px solid #5b3a1e;
  border-radius: 24px;
  padding: 7px 10px;
  display: none;
  align-items: center;
  justify-content: center;
  gap: 10px;
  z-index: 40;
  color: #5b3a1e;
  font-weight: 900;
  max-width: 96vw;
  flex-wrap: wrap;
}

.customEditPanel.show {
  display: flex;
}

.editGroup {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.editLabel {
  font-size: 17px;
  line-height: 1;
  font-weight: 900;
  color: #5b3a1e;
}

.editButtons {
  display: flex;
  align-items: center;
  gap: 4px;
}

.customEditPanel input[type="range"] {
  width: 160px;
  padding: 0;
  border: none;
}

.customEditPanel button {
  font-size: 14px;
  padding: 5px 10px;
}

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.modal.show { display: flex; }

.modalBox {
  width: min(92vw, 570px);
  max-height: 92dvh;
  overflow-y: auto;
  background: #fff7df;
  border: 6px solid #5b3a1e;
  border-radius: 26px;
  padding: 20px;
  text-align: center;
  box-shadow: 0 12px 0 #3b2412;
}

.modalBox h2 {
  margin: 0 0 12px;
  font-size: 30px;
  color: #5b3a1e;
}

.settingRow {
  margin: 10px 0;
  font-size: 18px;
  font-weight: bold;
  color: #5b3a1e;
}

input, select {
  width: 145px;
  padding: 7px;
  font-size: 18px;
  text-align: center;
  border: 3px solid #5b3a1e;
  border-radius: 10px;
  background: white;
}

.layoutNameInput {
  width: min(82vw, 260px);
  margin-top: 6px;
}

.renameArea {
  display: none;
  margin-top: 8px;
}

.renameArea.show {
  display: block;
}

.toggleLine {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 9px;
}

.toggleLine input {
  width: 24px;
  height: 24px;
}

.settingBlock {
  border: 3px solid #5b3a1e;
  border-radius: 18px;
  padding: 10px;
  margin: 10px 0;
  background: rgba(255,255,255,0.45);
}

.selectHint {
  font-size: 15px;
  color: #7a4b25;
  margin-top: 4px;
}

.miniGrid {
  margin: 10px auto 6px;
  display: grid;
  gap: 8px;
  width: min(88vw, 390px);
}

.miniHole {
  aspect-ratio: 1;
  border-radius: 50%;
  background: #5b3a1e;
  border: 4px solid transparent;
  cursor: pointer;
}

.miniHole.selected {
  border-color: #ffcc00;
  box-shadow: 0 0 0 3px #5b3a1e;
}

.resultText {
  font-size: 28px;
  font-weight: bold;
  color: #5b3a1e;
}

@media (max-height: 760px) {
  .title { font-size: 18px; }
  .hud { font-size: 15px; }
  button { font-size: 14px; padding: 4px 11px; }
  .topBar { padding: 4px 7px; }
  .controls { margin-top: 2px; }
  .customEditPanel { gap: 6px; padding: 6px 8px; }
  .customEditPanel input[type="range"] { width: 130px; }
}
</style>
</head>

<body>

<div class="game">
  <div class="topBar">
    <div class="hud">
      <div class="hudLeft">分數：<span id="score">0</span></div>
      <div class="hudCenter">
        <div class="title">打地鼠</div>
        <div>時間：<span id="time">60</span>s</div>
      </div>
      <div class="hudRight"><span id="modeInfo">普通</span>｜洞：<span id="holeInfo">3×3</span></div>
    </div>

    <div class="controls">
      <button onclick="openSettings()">設定</button>
      <button id="mainButton" onclick="toggleGame()">開始遊戲</button>
    </div>
  </div>

  <div class="boardWrap" id="boardWrap">
    <div class="board" id="board"></div>
  </div>
</div>

<div class="customEditPanel" id="customEditPanel">
  <div class="editGroup">
    <div class="editLabel">洞數：<span id="liveHoleCount">9</span></div>
    <div class="editButtons">
      <button onclick="removeCustomHoleLive()">－洞</button>
      <button onclick="addCustomHoleLive()">＋洞</button>
    </div>
  </div>

  <div class="editGroup">
    <div class="editLabel">大小：<span id="customSizeLabel">50</span></div>
    <input id="liveHoleSize" type="range" min="1" max="100" value="50" oninput="resizeCustomHolesLive(this.value)">
  </div>

  <button onclick="finishCustomEditAndStart()">完成並開始</button>
</div>

<div class="evilOverlay" id="evilOverlay"></div>
<div class="toast" id="toast">打中！</div>

<div class="modal show" id="settingsModal">
  <div class="modalBox">
    <h2>遊戲設定</h2>

    <div class="settingRow">
      模式<br>
      <select id="modeSelect" onchange="renderModeSettings()">
        <option value="normal">普通模式</option>
        <option value="custom">自定模式</option>
      </select>
    </div>

    <div class="settingRow">
      地鼠出現時間<br>
      <input id="speedInput" type="number" value="0.8" min="0.1" max="10" step="0.1">
      秒
    </div>

    <div id="normalSettings" class="settingBlock">
      <div class="settingRow">
        洞的數量<br>
        <select id="gridSelect" onchange="onGridChange()">
          <option value="3x3">3×3</option>
          <option value="4x3">4×3</option>
          <option value="5x3">5×3</option>
        </select>
      </div>
    </div>

    <div id="customSettings" class="settingBlock" style="display:none;">
      <div class="settingRow">
        自定版面<br>
        <select id="layoutSlotSelect" onchange="loadSelectedLayoutSlot()">
          <option value="1">版面 1</option>
          <option value="2">版面 2</option>
          <option value="3">版面 3</option>
        </select>
        <br>
        <button onclick="toggleRenameArea()">更改名稱</button>
        <div class="renameArea" id="renameArea">
          <input id="layoutNameInput" class="layoutNameInput" type="text" maxlength="16" placeholder="輸入版面名稱">
          <br>
          <button onclick="saveLayoutName()">儲存名稱</button>
        </div>
      </div>

      <div class="settingRow">
        目前洞數：<span id="customHoleCount">9</span><br>
        洞大小：<span id="settingsSizeLabel">50</span>
      </div>

      <button onclick="saveCustomLayout()">儲存版面</button>
      <button onclick="resetCustomLayout()">重設此版面</button>
    </div>

    <div class="settingRow toggleLine">
      <input id="evilToggle" type="checkbox">
      <label for="evilToggle">開啟邪惡地鼠</label>
    </div>

    <div class="settingRow toggleLine">
      <input id="limitedHoleToggle" type="checkbox" onchange="renderMiniGrid()">
      <label for="limitedHoleToggle">指定地鼠出現洞口</label>
    </div>

    <div id="miniGridArea">
      <div class="selectHint">黃色代表會出現地鼠。</div>
      <div class="miniGrid" id="miniGrid"></div>
      <button onclick="selectAllMiniHoles()">全選洞口</button>
      <button onclick="clearMiniHoles()">清除選擇</button>
    </div>

    <br>
    <button id="settingsStartButton" onclick="applySettingsAndStart()">開始遊戲</button>
  </div>
</div>

<div class="modal" id="resultModal">
  <div class="modalBox">
    <h2>時間到！</h2>
    <div class="resultText" id="resultText">你打中 0 分！</div>
    <br>
    <button onclick="closeResult()">再玩一次</button>
    <button onclick="openSettings()">重新設定</button>
  </div>
</div>

<script>
const STORAGE_PREFIX = "whackMoleCustomLayoutSlotV5_";
const MIN_CUSTOM_SIZE = 40;
const MAX_CUSTOM_SIZE = 600;

const boardWrap = document.getElementById("boardWrap");
const board = document.getElementById("board");
const scoreText = document.getElementById("score");
const timeText = document.getElementById("time");
const speedInput = document.getElementById("speedInput");
const modeSelect = document.getElementById("modeSelect");
const normalSettings = document.getElementById("normalSettings");
const customSettings = document.getElementById("customSettings");
const gridSelect = document.getElementById("gridSelect");
const layoutSlotSelect = document.getElementById("layoutSlotSelect");
const layoutNameInput = document.getElementById("layoutNameInput");
const renameArea = document.getElementById("renameArea");
const customHoleCount = document.getElementById("customHoleCount");
const liveHoleCount = document.getElementById("liveHoleCount");
const customSizeLabel = document.getElementById("customSizeLabel");
const settingsSizeLabel = document.getElementById("settingsSizeLabel");
const evilToggle = document.getElementById("evilToggle");
const limitedHoleToggle = document.getElementById("limitedHoleToggle");
const miniGridArea = document.getElementById("miniGridArea");
const miniGrid = document.getElementById("miniGrid");
const holeInfo = document.getElementById("holeInfo");
const modeInfo = document.getElementById("modeInfo");
const settingsModal = document.getElementById("settingsModal");
const resultModal = document.getElementById("resultModal");
const resultText = document.getElementById("resultText");
const mainButton = document.getElementById("mainButton");
const settingsStartButton = document.getElementById("settingsStartButton");
const customEditPanel = document.getElementById("customEditPanel");
const liveHoleSize = document.getElementById("liveHoleSize");
const toast = document.getElementById("toast");
const evilOverlay = document.getElementById("evilOverlay");

let score = 0;
let timeLeft = 60;
let moleTimer = null;
let countdownTimer = null;
let currentHole = null;
let playing = false;
let isHitAnimating = false;

let gameMode = "normal";
let rows = 3;
let cols = 3;
let holes = [];
let selectedHoleIndexes = new Set();

let evilEnabled = false;
let limitedHolesEnabled = false;
let currentMoleIsEvil = false;
let toastTimer = null;

let customHoles = [];
let customSizeLevel = 50;
let customSize = levelToPx(customSizeLevel);
let currentSlot = 1;
let currentLayoutName = "版面 1";

let editMode = false;
let draggingHole = null;
let dragOffsetX = 0;
let dragOffsetY = 0;

function levelToPx(level) {
  const safeLevel = Math.max(1, Math.min(100, Number(level) || 50));
  return MIN_CUSTOM_SIZE + ((safeLevel - 1) / 99) * (MAX_CUSTOM_SIZE - MIN_CUSTOM_SIZE);
}

function pxToLevel(px) {
  const level = 1 + ((px - MIN_CUSTOM_SIZE) / (MAX_CUSTOM_SIZE - MIN_CUSTOM_SIZE)) * 99;
  return Math.max(1, Math.min(100, Math.round(level)));
}

function defaultCustomLayout() {
  const list = [];
  for (let i = 0; i < 9; i++) {
    const col = i % 3;
    const row = Math.floor(i / 3);
    list.push({ x: 18 + col * 32, y: 18 + row * 30 });
  }
  return { sizeLevel: 50, holes: list };
}

function getSlotKey(slot = currentSlot) {
  return STORAGE_PREFIX + slot;
}

function getDefaultLayoutName(slot) {
  return "版面 " + slot;
}

function refreshLayoutSlotOptions() {
  for (let slot = 1; slot <= 3; slot++) {
    const option = layoutSlotSelect.querySelector('option[value="' + slot + '"]');
    if (!option) continue;

    let name = getDefaultLayoutName(slot);

    try {
      const saved = localStorage.getItem(getSlotKey(slot));
      if (saved) {
        const data = JSON.parse(saved);
        if (data.name && String(data.name).trim()) {
          name = String(data.name).trim();
        }
      }
    } catch {}

    option.textContent = name;
  }
}

function getLayoutNameForSave() {
  const typed = layoutNameInput.value.trim();

  if (typed) return typed;

  const currentDefault = getDefaultLayoutName(currentSlot);
  const currentOption = layoutSlotSelect.querySelector('option[value="' + currentSlot + '"]');
  const optionName = currentOption ? currentOption.textContent.trim() : currentDefault;

  return optionName || currentDefault;
}

function toggleRenameArea() {
  renameArea.classList.toggle("show");
  layoutNameInput.value = currentLayoutName || getDefaultLayoutName(currentSlot);
  layoutNameInput.focus();
}

function saveLayoutName() {
  currentLayoutName = getLayoutNameForSave();
  layoutNameInput.value = currentLayoutName;
  saveCustomLayout();
  renameArea.classList.remove("show");
}

function loadCustomLayout(slot = currentSlot) {
  currentSlot = Number(slot) || 1;
  layoutSlotSelect.value = String(currentSlot);
  if (renameArea) renameArea.classList.remove("show");

  try {
    const saved = localStorage.getItem(getSlotKey(currentSlot));
    if (!saved) throw new Error("no saved layout");

    const data = JSON.parse(saved);
    currentLayoutName = data.name && String(data.name).trim()
      ? String(data.name).trim()
      : getDefaultLayoutName(currentSlot);

    if (data.sizeLevel) {
      customSizeLevel = Math.max(1, Math.min(100, Number(data.sizeLevel)));
    } else if (data.size) {
      customSizeLevel = pxToLevel(Number(data.size));
    } else {
      customSizeLevel = 50;
    }

    customHoles = Array.isArray(data.holes) && data.holes.length
      ? data.holes
      : defaultCustomLayout().holes;
  } catch {
    const d = defaultCustomLayout();
    customSizeLevel = d.sizeLevel;
    customHoles = d.holes;
    currentLayoutName = getDefaultLayoutName(currentSlot);
  }

  customSize = levelToPx(customSizeLevel);
  refreshLayoutSlotOptions();
  updateCustomLabels();
}

function loadSelectedLayoutSlot() {
  loadCustomLayout(layoutSlotSelect.value);
  selectedHoleIndexes.clear();
  renderMiniGrid();

  if (gameMode === "custom") {
    createBoard();
    if (editMode) enterCustomEditVisualOnly();
  }
}

function saveCustomLayout(silent = false) {
  saveCurrentCustomPositions();

  currentLayoutName = getLayoutNameForSave();
  layoutNameInput.value = currentLayoutName;

  const data = {
    name: currentLayoutName,
    sizeLevel: customSizeLevel,
    holes: customHoles
  };

  localStorage.setItem(getSlotKey(currentSlot), JSON.stringify(data));
  refreshLayoutSlotOptions();
  updateCustomLabels();
  if (!silent) showToast("已儲存：" + currentLayoutName, false);
}

function resetCustomLayout() {
  const d = defaultCustomLayout();
  customSizeLevel = d.sizeLevel;
  customSize = levelToPx(customSizeLevel);
  customHoles = d.holes;
  selectedHoleIndexes.clear();
  currentLayoutName = getDefaultLayoutName(currentSlot);
  layoutNameInput.value = currentLayoutName;
  if (renameArea) renameArea.classList.remove("show");

  updateCustomLabels();
  createBoard();
  renderMiniGrid();
  saveCustomLayout();
}

function updateCustomLabels() {
  customSize = levelToPx(customSizeLevel);

  customHoleCount.textContent = customHoles.length;
  liveHoleCount.textContent = customHoles.length;
  customSizeLabel.textContent = customSizeLevel;
  settingsSizeLabel.textContent = customSizeLevel;
  liveHoleSize.value = customSizeLevel;
  layoutNameInput.value = currentLayoutName || getDefaultLayoutName(currentSlot);
}

function addCustomHole() {
  if (customHoles.length >= 30) return;

  const n = customHoles.length;
  customHoles.push({
    x: 10 + (n % 5) * 18,
    y: 15 + Math.floor(n / 5) * 18
  });

  updateCustomLabels();
}

function removeCustomHole() {
  if (customHoles.length <= 1) return;

  customHoles.pop();
  selectedHoleIndexes = new Set(
    [...selectedHoleIndexes].filter(index => index < customHoles.length)
  );

  updateCustomLabels();
}

function addCustomHoleLive() {
  addCustomHole();
  createBoard();
  enterCustomEditVisualOnly();
  renderMiniGrid();
  saveCustomLayout(true);
}

function removeCustomHoleLive() {
  removeCustomHole();
  createBoard();
  enterCustomEditVisualOnly();
  renderMiniGrid();
  saveCustomLayout(true);
}

function resizeCustomHolesLive(value) {
  customSizeLevel = Math.max(1, Math.min(100, Number(value) || 50));
  customSize = levelToPx(customSizeLevel);
  updateCustomLabels();

  holes.forEach(hole => {
    hole.style.width = customSize + "px";
    hole.style.height = customSize + "px";
  });

  saveCustomLayout(true);
}

function getGridSizeFromSelect() {
  if (gridSelect.value === "3x3") return { cols: 3, rows: 3 };
  if (gridSelect.value === "4x3") return { cols: 4, rows: 3 };
  if (gridSelect.value === "5x3") return { cols: 5, rows: 3 };
  return { cols: 3, rows: 3 };
}

function renderModeSettings() {
  gameMode = modeSelect.value;

  normalSettings.style.display = gameMode === "normal" ? "block" : "none";
  customSettings.style.display = gameMode === "custom" ? "block" : "none";
  settingsStartButton.textContent = gameMode === "custom" ? "編輯位置" : "開始遊戲";
  if (gameMode !== "custom" && renameArea) renameArea.classList.remove("show");

  if (gameMode === "custom") {
    refreshLayoutSlotOptions();
    loadCustomLayout(currentSlot);
  } else {
    refreshLayoutSlotOptions();
    updateCustomLabels();
  }

  renderMiniGrid();
}

function resizeBoard() {
  if (gameMode === "custom") return;

  const rect = boardWrap.getBoundingClientRect();
  const gap = Math.max(8, Math.min(18, rect.width * 0.012));
  const sizeByWidth = (rect.width - gap * (cols - 1)) / cols;
  const sizeByHeight = (rect.height - gap * (rows - 1)) / rows;
  const holeSize = Math.floor(Math.min(sizeByWidth, sizeByHeight));

  board.style.setProperty("--holeSize", holeSize + "px");
  board.style.setProperty("--gap", gap + "px");
}

function createHoleElement(index) {
  const hole = document.createElement("div");
  hole.className = "hole";
  hole.dataset.index = index;

  const mole = document.createElement("div");
  mole.className = "mole";

  const stars = document.createElement("div");
  stars.className = "stars";
  stars.textContent = "⭐";

  const leftEye = document.createElement("div");
  leftEye.className = "eye left";

  const rightEye = document.createElement("div");
  rightEye.className = "eye right";

  const nose = document.createElement("div");
  nose.className = "nose";

  mole.appendChild(stars);
  mole.appendChild(leftEye);
  mole.appendChild(rightEye);
  mole.appendChild(nose);
  hole.appendChild(mole);

  hole.addEventListener("pointerdown", (e) => {
    if (editMode && gameMode === "custom") {
      startDragHole(e, hole);
      return;
    }

    if (!playing || isHitAnimating) return;

    if (hole.classList.contains("show")) {
      hitMole(hole);
    } else {
      wrongHit(hole);
    }
  });

  return hole;
}

function createBoard() {
  board.innerHTML = "";
  holes = [];

  if (gameMode === "custom") {
    board.classList.add("customBoard");
    board.style.gridTemplateColumns = "";
    board.style.gridTemplateRows = "";

    customHoles.forEach((pos, i) => {
      const hole = createHoleElement(i);
      hole.style.width = customSize + "px";
      hole.style.height = customSize + "px";
      hole.style.left = pos.x + "%";
      hole.style.top = pos.y + "%";
      hole.style.transform = "translate(-50%, -50%)";

      board.appendChild(hole);
      holes.push(hole);
    });

    holeInfo.textContent = customHoles.length;
    modeInfo.textContent = "自定";
  } else {
    board.classList.remove("customBoard");

    board.style.gridTemplateColumns = `repeat(${cols}, var(--holeSize))`;
    board.style.gridTemplateRows = `repeat(${rows}, var(--holeSize))`;

    for (let i = 0; i < rows * cols; i++) {
      const hole = createHoleElement(i);
      board.appendChild(hole);
      holes.push(hole);
    }

    holeInfo.textContent = `${cols}×${rows}`;
    modeInfo.textContent = "普通";
    requestAnimationFrame(resizeBoard);
  }
}

function enterCustomEditMode() {
  settingsModal.classList.remove("show");
  resultModal.classList.remove("show");
  customEditPanel.classList.add("show");

  gameMode = "custom";
  modeSelect.value = "custom";
  applySettings();
  stopGame();

  editMode = true;
  playing = false;
  mainButton.textContent = "開始遊戲";
  enterCustomEditVisualOnly();
}

function enterCustomEditVisualOnly() {
  editMode = true;
  customEditPanel.classList.add("show");
  updateCustomLabels();

  holes.forEach(hole => {
    hole.classList.add("editing");
    hole.classList.remove("show", "hit", "wrong");
    const mole = hole.querySelector(".mole");
    if (mole) {
      mole.classList.remove("evil", "hitEye");
    }
  });

  updateSpawnHoleVisuals();
}

function finishCustomEditAndStart() {
  saveCurrentCustomPositions();
  saveCustomLayout();

  editMode = false;
  customEditPanel.classList.remove("show");
  holes.forEach(hole => hole.classList.remove("editing"));

  startGame();
}

function startDragHole(e, hole) {
  e.preventDefault();

  draggingHole = hole;
  const rect = hole.getBoundingClientRect();

  dragOffsetX = e.clientX - rect.left - rect.width / 2;
  dragOffsetY = e.clientY - rect.top - rect.height / 2;

  hole.setPointerCapture(e.pointerId);
}

window.addEventListener("pointermove", (e) => {
  if (!draggingHole) return;

  const wrapRect = boardWrap.getBoundingClientRect();

  let x = ((e.clientX - wrapRect.left - dragOffsetX) / wrapRect.width) * 100;
  let y = ((e.clientY - wrapRect.top - dragOffsetY) / wrapRect.height) * 100;

  x = Math.max(3, Math.min(97, x));
  y = Math.max(3, Math.min(97, y));

  draggingHole.style.left = x + "%";
  draggingHole.style.top = y + "%";

  const index = Number(draggingHole.dataset.index);
  customHoles[index] = { x, y };
});

window.addEventListener("pointerup", () => {
  if (!draggingHole) return;
  draggingHole = null;
  saveCurrentCustomPositions();
  saveCustomLayout(true);
});

function saveCurrentCustomPositions() {
  if (gameMode !== "custom" || !holes.length) return;

  holes.forEach((hole, i) => {
    customHoles[i] = {
      x: parseFloat(hole.style.left),
      y: parseFloat(hole.style.top)
    };
  });
}

function renderMiniGrid() {
  const total = gameMode === "custom"
    ? customHoles.length
    : getGridSizeFromSelect().rows * getGridSizeFromSelect().cols;

  const colsForMini = gameMode === "custom"
    ? Math.ceil(Math.sqrt(total))
    : getGridSizeFromSelect().cols;

  miniGridArea.style.display = limitedHoleToggle.checked ? "block" : "none";
  miniGrid.innerHTML = "";
  miniGrid.style.gridTemplateColumns = `repeat(${colsForMini}, 1fr)`;

  for (let i = 0; i < total; i++) {
    const miniHole = document.createElement("div");
    miniHole.className = "miniHole";

    if (selectedHoleIndexes.has(i)) miniHole.classList.add("selected");

    miniHole.addEventListener("pointerdown", () => {
      if (!limitedHoleToggle.checked) return;

      if (selectedHoleIndexes.has(i)) selectedHoleIndexes.delete(i);
      else selectedHoleIndexes.add(i);

      renderMiniGrid();
    });

    miniGrid.appendChild(miniHole);
  }

  updateSpawnHoleVisuals();
}

function onGridChange() {
  const size = getGridSizeFromSelect();
  const total = size.rows * size.cols;

  selectedHoleIndexes = new Set(
    [...selectedHoleIndexes].filter(index => index < total)
  );

  renderMiniGrid();
  updateSpawnHoleVisuals();
}

function selectAllMiniHoles() {
  const total = gameMode === "custom"
    ? customHoles.length
    : getGridSizeFromSelect().rows * getGridSizeFromSelect().cols;

  selectedHoleIndexes.clear();
  for (let i = 0; i < total; i++) selectedHoleIndexes.add(i);

  limitedHoleToggle.checked = true;
  renderMiniGrid();
  updateSpawnHoleVisuals();
}

function clearMiniHoles() {
  selectedHoleIndexes.clear();
  renderMiniGrid();
  updateSpawnHoleVisuals();
}

function clearSpawnHoleVisuals() {
  holes.forEach(hole => {
    hole.classList.remove("spawnSelected");
  });
}

function updateSpawnHoleVisuals() {
  holes.forEach((hole, index) => {
    hole.classList.remove("spawnSelected");

    if (
      editMode &&
      gameMode === "custom" &&
      limitedHoleToggle.checked &&
      selectedHoleIndexes.has(index)
    ) {
      hole.classList.add("spawnSelected");
    }
  });
}

function applySettings() {
  gameMode = modeSelect.value;

  if (gameMode === "normal") {
    const size = getGridSizeFromSelect();
    cols = size.cols;
    rows = size.rows;
  } else {
    saveCurrentCustomPositions();
    saveCustomLayout();
  }

  evilEnabled = evilToggle.checked;
  limitedHolesEnabled = limitedHoleToggle.checked;

  const total = gameMode === "custom" ? customHoles.length : rows * cols;

  if (limitedHolesEnabled && selectedHoleIndexes.size === 0) {
    for (let i = 0; i < total; i++) selectedHoleIndexes.add(i);
  }

  selectedHoleIndexes = new Set(
    [...selectedHoleIndexes].filter(index => index < total)
  );

  createBoard();
}

function applySettingsAndStart() {
  if (modeSelect.value === "custom") {
    enterCustomEditMode();
  } else {
    settingsModal.classList.remove("show");
    applySettings();
    startGame();
  }
}

function openSettings() {
  stopGame();
  customEditPanel.classList.remove("show");
  editMode = false;
  resultModal.classList.remove("show");
  settingsModal.classList.add("show");
  renderModeSettings();
  renderMiniGrid();
}

function toggleGame() {
  if (editMode) {
    finishCustomEditAndStart();
    return;
  }

  playing ? stopGame() : startGame();
}

function hitMole(hole) {
  const mole = hole.querySelector(".mole");

  if (currentMoleIsEvil) {
    score = Math.max(0, score - 1);
    scoreText.textContent = score;
    playWrongSound();
    showToast("邪惡地鼠！-1", true);
    showEvilOverlay();
  } else {
    score++;
    scoreText.textContent = score;
    playHitSound();
    showToast("打中！+1", false);
  }

  clearTimeout(moleTimer);
  isHitAnimating = true;

  hole.classList.remove("show");
  hole.classList.add("hit");
  mole.classList.add("hitEye");

  setTimeout(() => {
    hole.classList.remove("hit");
    mole.classList.remove("evil");
    mole.classList.remove("hitEye");
    currentHole = null;
    isHitAnimating = false;
    currentMoleIsEvil = false;

    if (playing) showMole();
  }, 420);
}

function wrongHit(hole) {
  playWrongSound();
  showToast("打錯！", true);

  hole.classList.add("wrong");

  setTimeout(() => {
    hole.classList.remove("wrong");
  }, 250);
}

function showToast(text, wrong) {
  clearTimeout(toastTimer);
  toast.textContent = text;
  toast.classList.toggle("wrongText", wrong);
  toast.classList.add("show");

  toastTimer = setTimeout(() => {
    toast.classList.remove("show");
  }, 500);
}

function showEvilOverlay() {
  evilOverlay.classList.remove("show");
  void evilOverlay.offsetWidth;
  evilOverlay.classList.add("show");
}

function playHitSound() {
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const oscillator = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  oscillator.type = "square";
  oscillator.frequency.setValueAtTime(520, audioCtx.currentTime);
  oscillator.frequency.exponentialRampToValueAtTime(180, audioCtx.currentTime + 0.12);

  gain.gain.setValueAtTime(0.18, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);

  oscillator.connect(gain);
  gain.connect(audioCtx.destination);

  oscillator.start();
  oscillator.stop(audioCtx.currentTime + 0.12);
}

function playWrongSound() {
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const oscillator = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  oscillator.type = "sawtooth";
  oscillator.frequency.setValueAtTime(160, audioCtx.currentTime);
  oscillator.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.15);

  gain.gain.setValueAtTime(0.14, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);

  oscillator.connect(gain);
  gain.connect(audioCtx.destination);

  oscillator.start();
  oscillator.stop(audioCtx.currentTime + 0.15);
}

function getAvailableHoleIndexes() {
  if (!limitedHolesEnabled) return holes.map((_, index) => index);

  const validIndexes = [...selectedHoleIndexes].filter(index => index >= 0 && index < holes.length);
  return validIndexes.length ? validIndexes : holes.map((_, index) => index);
}

function showMole() {
  holes.forEach(hole => {
    hole.classList.remove("show");
    hole.classList.remove("hit");
    const mole = hole.querySelector(".mole");
    mole.classList.remove("evil");
    mole.classList.remove("hitEye");
  });

  const availableIndexes = getAvailableHoleIndexes();
  const randomIndex = availableIndexes[Math.floor(Math.random() * availableIndexes.length)];

  currentHole = holes[randomIndex];
  currentMoleIsEvil = evilEnabled && Math.random() < 0.25;

  const mole = currentHole.querySelector(".mole");
  mole.classList.toggle("evil", currentMoleIsEvil);

  currentHole.classList.add("show");

  let speedInSeconds = Number(speedInput.value);

  if (isNaN(speedInSeconds) || speedInSeconds < 0.1) {
    speedInSeconds = 0.8;
    speedInput.value = 0.8;
  }

  const speed = speedInSeconds * 1000;

  moleTimer = setTimeout(() => {
    if (currentHole) {
      currentHole.classList.remove("show");
      currentHole.querySelector(".mole").classList.remove("evil");
      currentHole = null;
    }

    currentMoleIsEvil = false;

    if (playing) showMole();
  }, speed);
}

function startGame() {
  stopGame();
  applySettings();

  score = 0;
  timeLeft = 60;
  playing = true;
  isHitAnimating = false;
  currentMoleIsEvil = false;
  editMode = false;
  customEditPanel.classList.remove("show");

  scoreText.textContent = score;
  timeText.textContent = timeLeft;
  resultModal.classList.remove("show");
  settingsModal.classList.remove("show");
  mainButton.textContent = "結束遊戲";

  holes.forEach(hole => hole.classList.remove("editing"));
  clearSpawnHoleVisuals();

  showMole();

  countdownTimer = setInterval(() => {
    timeLeft--;
    timeText.textContent = timeLeft;
    if (timeLeft <= 0) endGame();
  }, 1000);
}

function stopGame() {
  playing = false;
  isHitAnimating = false;
  currentMoleIsEvil = false;

  clearTimeout(moleTimer);
  clearInterval(countdownTimer);

  holes.forEach(hole => {
    hole.classList.remove("show");
    hole.classList.remove("hit");
    hole.classList.remove("wrong");

    const mole = hole.querySelector(".mole");
    if (mole) {
      mole.classList.remove("evil");
      mole.classList.remove("hitEye");
    }
  });

  mainButton.textContent = "開始遊戲";
}

function endGame() {
  stopGame();
  resultText.textContent = "你打中 " + score + " 分！";
  resultModal.classList.add("show");
}

function closeResult() {
  resultModal.classList.remove("show");

  if (gameMode === "custom") {
    enterCustomEditMode();
  } else {
    startGame();
  }
}

window.addEventListener("resize", resizeBoard);
window.addEventListener("orientationchange", () => {
  setTimeout(resizeBoard, 300);
});

refreshLayoutSlotOptions();
loadCustomLayout(1);
renderModeSettings();
createBoard();
renderMiniGrid();
</script>

</body>
</html>
